<!DOCTYPE html>
<html>
<head>
    <title>OTP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 300px;">

    <h4 class="text-center mb-3">🔢 Enter OTP</h4>

    <!-- ALERT -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{category}} alert-dismissible fade show">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <div id="cooldownBox" class="text-center mb-2 text-warning" style="display:none;">
    ⛔ Try again in <span id="countdown"></span> sec
    </div>

    <form method="POST">
        <input name="otp" class="form-control mb-3" placeholder="Enter OTP" required>
        <button id="submitBtn" class="btn btn-success w-100">Submit</button>
    </form>

    <!-- Back -->
    <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>
    </div>

</div>
<script>
let remaining = {{ remaining | default(0) }};

const box = document.getElementById("cooldownBox");
const text = document.getElementById("countdown");
const btn = document.getElementById("submitBtn");

if (remaining > 0) {
    box.style.display = "block";
    btn.disabled = true;

    function updateTimer() {
        text.innerText = remaining;

        if (remaining <= 0) {
            box.innerHTML = "✅ You can try again now";
            btn.disabled = false;
            return;
        }

        remaining--;
        setTimeout(updateTimer, 1000);
    }

    updateTimer();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

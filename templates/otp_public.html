<!DOCTYPE html>
<html>
<head>
    <title>OTP Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5 text-center">
    <!-- 🚪 Door Status -->
    <div class="text-center mb-4">
        <h5>
            🚪 Door Status:
            <span id="doorStatus"
                class="badge bg-{{ 'success' if door_status == 'UNLOCKED' else 'secondary' }}">
                {{ door_status }}
            </span>
        </h5>

        <a href="/close-door-otp-public" class="btn btn-dark mt-2 w-100">
            🔒 Lock Door
        </a>
    </div>

    <h3>🔢 Enter OTP</h3>

    <form method="POST" class="mt-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input name="otp" class="form-control text-center mb-3" placeholder="Enter 6-digit OTP">
        <button class="btn btn-success w-100">Open Door</button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{category}} mt-3">{{ message }}</div>
      {% endfor %}
    {% endwith %}
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let lastStatus = null;

  function updateDoorStatus() {
      fetch("/door-status")
          .then(res => res.json())
          .then(data => {
              let status = data.status;
              let el = document.getElementById("doorStatus");

              // อัปเดต UI
              el.innerText = status;

              if (status === "UNLOCKED") {
                  el.className = "badge bg-success";
              } else {
                  el.className = "badge bg-secondary";
              }

              // 🔥 detect change
              if (lastStatus !== status) {
                  lastStatus = status;

                  if (status === "UNLOCKED") {
                      window.open("https://www.google.com", "_blank");
                  }

                  // if (status === "LOCKED") {
                  //     window.open("https://dru1.dru.ac.th/", "_blank");
                  // }
              }
          });
  }

  // 🔁 เช็คทุก 2 วินาที
  setInterval(updateDoorStatus, 2000);

  // โหลดครั้งแรก
  updateDoorStatus();
</script>
</body>
</html>
